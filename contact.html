<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Vision Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-grid min-h-screen">
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[var(--bg)]/80 backdrop-blur-xl border-b border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-[var(--accent)] to-[#00a88a] flex items-center justify-center">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </div>
        <span class="text-xl font-semibold" style="font-family: 'Space Grotesk', sans-serif;">Vision Nova</span>
      </a>
      <nav class="hidden md:flex items-center gap-8">
        <a href="index.html" class="nav-link">Home</a>
        <a href="resources.html" class="nav-link">Resources</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <div class="hidden md:flex items-center gap-4">
        <a href="index.html#image-recognition-section" class="btn-primary">Use The Tool</a>
      </div>
      <button class="md:hidden p-2" onclick="toggleMobileMenu()" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-overlay" onclick="toggleMobileMenu()"></div>
  <div class="mobile-menu">
    <button class="absolute top-6 right-6" onclick="toggleMobileMenu()" aria-label="Close menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <nav class="flex flex-col gap-6">
      <a href="index.html" class="text-xl font-medium">Home</a>
      <a href="resources.html" class="text-xl font-medium text-[var(--muted)]">Resources</a>
      <a href="contact.html" class="text-xl font-medium text-[var(--muted)]">Contact</a>
      <a href="index.html#image-recognition-section" class="text-xl font-medium text-[var(--muted)]">Use The Tool</a>
    </nav>
  </div>

  <main class="pt-20 relative z-10">
    <div class="max-w-7xl mx-auto px-6 py-20 md:py-32">
      <div class="grid lg:grid-cols-2 gap-16">
        <div class="reveal">
          <h1 class="text-4xl md:text-6xl font-bold mb-4">Get in Touch</h1>
          <p class="text-[var(--muted)] text-lg mb-8">Have questions about Vision Nova? Our team is here to help you create accessible digital experiences.</p>
          
          <div class="space-y-6">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-[var(--accent-dim)] flex items-center justify-center shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <div><h3 class="font-semibold mb-1">Email</h3><p class="text-[var(--muted)]"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="15666065657a676155637c667c7a7b7b7a63743b7c7a">[email&#160;protected]</a></p></div>
            </div>
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-[var(--accent-dim)] flex items-center justify-center shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div><h3 class="font-semibold mb-1">Office</h3><p class="text-[var(--muted)]">123 Innovation Drive<br>San Francisco, CA 94107</p></div>
            </div>
          </div>
        </div>

        <div class="reveal" style="transition-delay: 0.2s;">
          <form id="contact-form" class="bg-[var(--card)] border border-[var(--border)] rounded-2xl p-6 md:p-8">
            <div class="grid md:grid-cols-2 gap-4 mb-4">
              <div><label for="contact-name" class="block text-sm font-medium mb-2">Full Name</label><input type="text" id="contact-name" class="form-input" placeholder="John Doe" required></div>
              <div><label for="contact-email" class="block text-sm font-medium mb-2">Email</label><input type="email" id="contact-email" class="form-input" placeholder="john@example.com" required></div>
            </div>
            <div class="mb-4"><label for="contact-subject" class="block text-sm font-medium mb-2">Subject</label>
              <select id="contact-subject" class="form-input" required>
                <option value="">Select a topic</option>
                <option value="sales">Sales Inquiry</option>
                <option value="support">Technical Support</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="mb-6"><label for="contact-message" class="block text-sm font-medium mb-2">Message</label><textarea id="contact-message" class="form-input" rows="5" placeholder="How can we help you?" required></textarea></div>
            <button type="submit" class="btn-primary w-full">Send Message</button>
            <p id="contact-status" class="mt-4 text-sm text-center" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-[var(--bg-elevated)] border-t border-[var(--border)] py-12 relative z-10">
    <div class="max-w-7xl mx-auto px-6 text-center text-[var(--muted)] text
